server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:3000
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - '*'
            allowCredentials: true
      discovery:
        locator:
          enabled: true
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**
        - id: traffic-service
          uri: http://localhost:8082
          predicates:
            - Path=/traffic/**
        - id: route-service
          uri: http://localhost:8083
          predicates:
            - Path=/route/**
        - id: notification-service
          uri: http://localhost:8084
          predicates:
            - Path=/notify/**
        - id: analytics-service
          uri: http://localhost:8086
          predicates:
            - Path=/analytics/**
        - id: websocket-service
          uri: http://localhost:8085
          predicates:
            - Path=/ws/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

security:
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-with-32-chars}
