server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/zentraffic}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

security:
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-with-32-chars}
    ttl-seconds: 86400
